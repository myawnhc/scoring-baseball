<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 360" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <style>
      .seg { stroke: #1a2744; stroke-width: 2.5; fill: none; stroke-linecap: round; }
      .seg-fill { fill: #1a2744; opacity: 0.06; }
      .base-sq { fill: none; stroke: #1a2744; stroke-width: 1.5; }
      .home-plate { fill: none; stroke: #1a2744; stroke-width: 1.5; }
      .label { font-size: 13px; fill: #1a2744; font-weight: 600; text-anchor: middle; }
      .base-label { font-size: 11px; fill: #555; font-weight: 500; text-anchor: middle; }
      .seg-num { font-size: 22px; fill: #2a6db5; font-weight: 700; text-anchor: middle; dominant-baseline: central; }
      .seg-num-bg { fill: #e8f0fa; stroke: #2a6db5; stroke-width: 1.5; }
      .arrow { fill: #2a6db5; }
    </style>
  </defs>

  <!-- Diamond fill -->
  <polygon points="180,30 310,160 180,290 50,160" class="seg-fill"/>

  <!-- Segments -->
  <line x1="180" y1="290" x2="310" y2="160" class="seg"/>
  <line x1="310" y1="160" x2="180" y2="30" class="seg"/>
  <line x1="180" y1="30" x2="50" y2="160" class="seg"/>
  <line x1="50" y1="160" x2="180" y2="290" class="seg"/>

  <!-- Bases -->
  <rect x="302" y="152" width="16" height="16" transform="rotate(45 310 160)" class="base-sq"/>
  <rect x="172" y="22" width="16" height="16" transform="rotate(45 180 30)" class="base-sq"/>
  <rect x="42" y="152" width="16" height="16" transform="rotate(45 50 160)" class="base-sq"/>
  <!-- Home plate -->
  <polygon points="180,296 173,288 173,280 187,280 187,288" class="home-plate"/>

  <!-- Base labels -->
  <text x="335" y="160" class="base-label">1B</text>
  <text x="180" y="16" class="base-label">2B</text>
  <text x="25" y="160" class="base-label">3B</text>
  <text x="180" y="320" class="base-label">Home</text>

  <!-- Segment numbers in circles -->
  <!-- Seg 0: Home to 1B -->
  <circle cx="260" cy="240" r="18" class="seg-num-bg"/>
  <text x="260" y="240" class="seg-num">0</text>

  <!-- Seg 1: 1B to 2B -->
  <circle cx="260" cy="80" r="18" class="seg-num-bg"/>
  <text x="260" y="80" class="seg-num">1</text>

  <!-- Seg 2: 2B to 3B -->
  <circle cx="100" cy="80" r="18" class="seg-num-bg"/>
  <text x="100" y="80" class="seg-num">2</text>

  <!-- Seg 3: 3B to Home -->
  <circle cx="100" cy="240" r="18" class="seg-num-bg"/>
  <text x="100" y="240" class="seg-num">3</text>

  <!-- Direction arrows (small triangles at midpoints) -->
  <!-- Seg 0 arrow -->
  <polygon points="248,222 256,218 252,226" class="arrow"/>
  <!-- Seg 1 arrow -->
  <polygon points="248,98 252,90 256,98" class="arrow"/>
  <!-- Seg 2 arrow -->
  <polygon points="112,98 108,90 104,98" class="arrow"/>
  <!-- Seg 3 arrow -->
  <polygon points="112,222 104,218 108,226" class="arrow"/>

  <!-- Legend text -->
  <text x="180" y="348" font-size="11" fill="#888" text-anchor="middle" font-style="italic">Segments numbered 0-3, counterclockwise from home</text>
</svg>
